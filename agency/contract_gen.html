<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근로계약서 자동 생성</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F4F8;--white:#fff;--navy:#1A3A5C;--blue:#2563EB;--blue-lt:#EFF6FF;
  --green:#16A34A;--green-lt:#F0FDF4;--gray:#64748B;--gray-lt:#F1F5F9;
  --border:#CBD5E1;--text:#1E293B;--red:#DC2626;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}

/* ── 화면 UI ── */
.header{background:var(--navy);padding:0 20px;display:flex;align-items:center;gap:12px;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header h1{color:#fff;font-size:18px;font-weight:900}
.header h1 span{color:#60A5FA}
.back-btn{background:rgba(255,255,255,.15);border:none;border-radius:8px;color:#fff;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit}
.back-btn:hover{background:rgba(255,255,255,.25)}

.main{padding:16px;max-width:1100px;margin:0 auto;display:grid;grid-template-columns:380px 1fr;gap:16px}
@media(max-width:800px){.main{grid-template-columns:1fr}}

/* 입력 패널 */
.input-panel{display:flex;flex-direction:column;gap:12px}
.card{background:var(--white);border-radius:12px;box-shadow:var(--shadow);padding:16px}
.card-title{font-size:14px;font-weight:900;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg:last-child{margin-bottom:0}
.fg label{font-size:12px;font-weight:700;color:var(--navy)}
.fg input,.fg select,.fg textarea{padding:10px 12px;border:2px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;transition:.2s;background:var(--white);width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue)}
.fg textarea{resize:vertical;min-height:60px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.full{grid-column:1/-1}

.btn{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:.2s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff;width:100%;justify-content:center;font-size:15px;padding:14px}
.btn-primary:hover{background:#1D4ED8}
.btn-print{background:var(--green);color:#fff;width:100%;justify-content:center;font-size:15px;padding:14px}
.btn-print:hover{background:#15803D}
.btn-outline{background:transparent;color:var(--blue);border:2px solid var(--blue)}
.btn-outline:hover{background:var(--blue-lt)}

/* 템플릿 선택 */
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.tpl-btn{border:2px solid var(--border);border-radius:9px;padding:10px;cursor:pointer;text-align:center;transition:.2s;background:var(--white);font-family:inherit}
.tpl-btn:hover{border-color:var(--blue);background:var(--blue-lt)}
.tpl-btn.active{border-color:var(--blue);background:var(--blue);color:#fff}
.tpl-btn .ti{font-size:20px;display:block;margin-bottom:4px}
.tpl-btn .tn{font-size:12px;font-weight:700}

/* 미리보기 패널 */
.preview-panel{position:sticky;top:76px;height:fit-content}
.preview-header{background:var(--white);border-radius:12px 12px 0 0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gray-lt);box-shadow:var(--shadow)}
.preview-actions{display:flex;gap:8px}
.preview-wrap{background:var(--white);border-radius:0 0 12px 12px;padding:20px;box-shadow:var(--shadow);min-height:600px;max-height:80vh;overflow-y:auto}

/* ─────────────────────────────
   계약서 스타일 (인쇄용)
───────────────────────────── */
.contract{
  font-family:'Noto Sans KR',sans-serif;
  font-size:11pt;
  line-height:1.8;
  color:#000;
  max-width:680px;
  margin:0 auto;
}
.contract-title{
  text-align:center;font-size:18pt;font-weight:900;
  border-bottom:3px double #000;padding-bottom:12px;margin-bottom:20px;
  letter-spacing:4px;
}
.contract-subtitle{text-align:center;font-size:10pt;color:#555;margin-bottom:24px}
.parties-box{
  border:2px solid #000;border-radius:0;padding:14px 18px;margin-bottom:20px;
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
}
.party-section h3{font-size:10pt;font-weight:900;color:#333;margin-bottom:8px;border-bottom:1px solid #ccc;padding-bottom:4px}
.party-row{display:flex;gap:8px;font-size:10pt;margin-bottom:4px}
.party-label{color:#666;min-width:60px;flex-shrink:0}
.party-value{font-weight:700}

.section{margin-bottom:18px}
.section-title{
  font-size:12pt;font-weight:900;
  background:#1A3A5C;color:#fff;
  padding:6px 12px;margin-bottom:10px;
}
.section-body{padding:0 4px;font-size:10pt;line-height:1.9}
.section-body table{width:100%;border-collapse:collapse;margin-top:6px}
.section-body table th{background:#f0f4f8;padding:7px 10px;text-align:left;font-size:10pt;border:1px solid #ddd;font-weight:700}
.section-body table td{padding:7px 10px;border:1px solid #ddd;font-size:10pt}
.section-body ul{padding-left:20px}
.section-body ul li{margin-bottom:4px}

.clause{margin-bottom:8px;display:flex;gap:8px}
.clause-num{font-weight:700;min-width:24px;flex-shrink:0}

.sign-area{
  margin-top:32px;border-top:2px solid #000;padding-top:20px;
  display:grid;grid-template-columns:1fr 1fr;gap:20px;
}
.sign-box{text-align:center}
.sign-box h4{font-size:11pt;font-weight:700;margin-bottom:16px}
.sign-line{border-bottom:1px solid #000;margin:0 20px 6px;padding-bottom:32px}
.sign-name{font-size:10pt;color:#555}

.contract-date{text-align:center;font-size:11pt;margin-bottom:20px;font-weight:700}
.stamp-area{text-align:right;font-size:10pt;color:#888;margin-top:8px}

/* ── 인쇄 미디어 ── */
@media print{
  body{background:#fff;padding:0}
  .header,.input-panel,.preview-header,.no-print{display:none!important}
  .main{display:block;padding:0;max-width:100%}
  .preview-panel{position:static;height:auto}
  .preview-wrap{max-height:none;overflow:visible;box-shadow:none;border-radius:0;padding:10mm 15mm}
  .contract-title{font-size:16pt}
  .section-title{font-size:11pt}
  @page{size:A4;margin:15mm}
}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}

/* 언어 탭 */
.lang-tab{border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;border-radius:100px;padding:5px 14px;font-size:12px;cursor:pointer;transition:.2s;font-family:inherit;font-weight:600}
.lang-tab:hover{background:rgba(255,255,255,.2)}
.lang-tab.active{background:#fff;color:var(--navy);font-weight:700}

/* 병기 계약서 스타일 */
.bilingual{display:grid;grid-template-columns:1fr 1fr;gap:0}
.bilingual .ko-col{border-right:1px solid #ddd;padding-right:8px}
.bilingual .fo-col{padding-left:8px;color:#1A3A5C}
.bi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start;border-bottom:1px dotted #eee;padding:3px 0}
.bi-ko{font-size:10pt}
.bi-fo{font-size:10pt;color:#1A3A5C}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">← 뒤로</button>
  <h1>📄 계약서 <span>자동 생성</span></h1>
</div>

<!-- 언어 선택 바 -->
<div style="background:#122744;padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
  <span style="color:#93C5FD;font-size:12px;font-weight:700">계약서 언어:</span>
  <button class="lang-tab active" onclick="setContractLang('ko',this)">🇰🇷 한국어</button>
  <button class="lang-tab" onclick="setContractLang('zh',this)">🇨🇳 中文 병기</button>
  <button class="lang-tab" onclick="setContractLang('en',this)">🇺🇸 English 병기</button>
  <span style="color:#64748B;font-size:11px;margin-left:8px">※ 병기: 한국어 + 해당 언어 동시 표기</span>
</div>

<div class="main">

  <!-- ── 입력 패널 ── -->
  <div class="input-panel">

    <!-- 계약서 종류 -->
    <div class="card">
      <div class="card-title">📋 계약서 종류</div>
      <div class="tpl-grid">
        <button class="tpl-btn active" onclick="setTpl('work',this)"><span class="ti">👷</span><span class="tn">근로계약서</span></button>
        <button class="tpl-btn" onclick="setTpl('seasonal',this)"><span class="ti">🌾</span><span class="tn">계절근로계약서</span></button>
        <button class="tpl-btn" onclick="setTpl('dispatch',this)"><span class="ti">🏭</span><span class="tn">파견근로계약서</span></button>
        <button class="tpl-btn" onclick="setTpl('renew',this)"><span class="ti">🔄</span><span class="tn">재계약서</span></button>
      </div>
    </div>

    <!-- 사업주 정보 -->
    <div class="card">
      <div class="card-title">🏢 사업주 정보</div>
      <div class="form-grid">
        <div class="fg full"><label>사업장명 *</label><input type="text" id="e-company" placeholder="예: (주)한국정밀" oninput="preview()"></div>
        <div class="fg full"><label>대표자명 *</label><input type="text" id="e-ceo" placeholder="예: 홍길동" oninput="preview()"></div>
        <div class="fg full"><label>사업장 주소</label><input type="text" id="e-addr" placeholder="예: 경기도 시흥시 정왕로 100" oninput="preview()"></div>
        <div class="fg"><label>사업자등록번호</label><input type="text" id="e-regno" placeholder="000-00-00000" oninput="preview()"></div>
        <div class="fg"><label>연락처</label><input type="text" id="e-tel" placeholder="031-000-0000" oninput="preview()"></div>
      </div>
    </div>

    <!-- 근로자 정보 -->
    <div class="card">
      <div class="card-title">👤 근로자 정보</div>
      <div class="form-grid">
        <div class="fg"><label>성명 *</label>
          <input type="text" id="w-name" placeholder="근로자 이름" oninput="preview()" list="wNameList">
          <datalist id="wNameList"></datalist>
        </div>
        <div class="fg"><label>국적</label>
          <select id="w-nation" onchange="preview()">
            <option value="">선택</option>
            <option>베트남</option><option>네팔</option><option>캄보디아</option>
            <option>인도네시아</option><option>미얀마</option><option>중국</option><option>기타</option>
          </select>
        </div>
        <div class="fg"><label>생년월일</label><input type="date" id="w-birth" oninput="preview()"></div>
        <div class="fg"><label>성별</label>
          <select id="w-gender" onchange="preview()"><option value="남">남</option><option value="여">여</option></select>
        </div>
        <div class="fg full"><label>주소 / 거주지</label><input type="text" id="w-addr" placeholder="거주지 주소" oninput="preview()"></div>
        <div class="fg"><label>연락처</label><input type="text" id="w-phone" placeholder="010-0000-0000" oninput="preview()"></div>
        <div class="fg"><label>비자 종류</label>
          <select id="w-visa" onchange="preview()">
            <option>E-9</option><option>E-7</option><option>E-7-4</option><option>E-8</option>
            <option>H-2</option><option>F-4</option><option>F-5</option><option>F-6</option><option>기타</option>
          </select>
        </div>
        <div class="fg"><label>외국인등록번호</label><input type="text" id="w-regnum" placeholder="000000-0000000" oninput="preview()"></div>
      </div>
    </div>

    <!-- 근로 조건 -->
    <div class="card">
      <div class="card-title">📋 근로 조건</div>
      <div class="form-grid">
        <div class="fg"><label>계약 시작일 *</label><input type="date" id="c-start" oninput="preview()"></div>
        <div class="fg"><label>계약 종료일 *</label><input type="date" id="c-end" oninput="preview()"></div>
        <div class="fg full"><label>근무 장소</label><input type="text" id="c-place" placeholder="예: 본사 / 시흥공장 3동" oninput="preview()"></div>
        <div class="fg full"><label>담당 업무</label><input type="text" id="c-job" placeholder="예: 금속 절삭 가공 및 조립" oninput="preview()"></div>
        <div class="fg"><label>근무 시간</label><input type="text" id="c-time" placeholder="예: 08:00 ~ 17:00" oninput="preview()"></div>
        <div class="fg"><label>휴게 시간</label><input type="text" id="c-rest" placeholder="예: 12:00 ~ 13:00 (60분)" oninput="preview()"></div>
        <div class="fg"><label>월 급여 *</label><input type="text" id="c-pay" placeholder="예: 2,600,000" oninput="preview()"></div>
        <div class="fg"><label>급여 지급일</label><input type="text" id="c-payday" placeholder="예: 매월 10일" oninput="preview()"></div>
        <div class="fg"><label>지급 방법</label>
          <select id="c-paymethod" onchange="preview()">
            <option>계좌이체</option><option>현금</option>
          </select>
        </div>
        <div class="fg"><label>주휴일</label><input type="text" id="c-holiday" placeholder="예: 매주 일요일" oninput="preview()"></div>
        <div class="fg"><label>숙식 제공</label>
          <select id="c-accomm" onchange="preview()">
            <option value="미제공">미제공</option>
            <option value="숙소 제공">숙소 제공</option>
            <option value="식사 제공">식사 제공</option>
            <option value="숙식 모두 제공">숙식 모두 제공</option>
          </select>
        </div>
        <div class="fg"><label>4대보험</label>
          <select id="c-insurance" onchange="preview()">
            <option value="가입">가입 (공제)</option>
            <option value="미가입">미가입</option>
          </select>
        </div>
        <div class="fg full"><label>특약 사항</label>
          <textarea id="c-special" placeholder="추가 합의 사항이 있으면 입력하세요 (없으면 비워두세요)" oninput="preview()"></textarea>
        </div>
      </div>
    </div>

    <!-- 소개소 정보 -->
    <div class="card">
      <div class="card-title">🏢 직업소개소 정보 <span style="font-size:11px;font-weight:400;color:var(--gray)">(선택)</span></div>
      <div class="form-grid">
        <div class="fg"><label>소개소명</label><input type="text" id="a-name" placeholder="○○직업소개소" oninput="preview()"></div>
        <div class="fg"><label>담당자</label><input type="text" id="a-manager" oninput="preview()"></div>
        <div class="fg full"><label>소개소 연락처</label><input type="text" id="a-tel" oninput="preview()"></div>
      </div>
    </div>

    <!-- 버튼 -->
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-print" onclick="printContract()">🖨️ PDF 인쇄 / 저장</button>
      <button class="btn btn-outline" onclick="saveTemplate()">💾 입력 내용 저장</button>
      <button class="btn btn-outline" onclick="loadTemplate()">📂 저장된 내용 불러오기</button>
    </div>

  </div>

  <!-- ── 미리보기 패널 ── -->
  <div class="preview-panel">
    <div class="preview-header no-print">
      <span style="font-size:14px;font-weight:700;color:var(--navy)">📄 계약서 미리보기</span>
      <div class="preview-actions">
        <button class="btn btn-outline" style="font-size:12px;padding:7px 12px" onclick="printContract()">🖨️ 인쇄</button>
      </div>
    </div>
    <div class="preview-wrap" id="previewWrap"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── URL 파라미터 ──
const OWNER = new URLSearchParams(window.location.search).get('owner')||'';
let currentTpl = 'work';
let contractLang = 'ko'; // 'ko' | 'zh' | 'en'

// ── 언어 전환 ──
function setContractLang(lang, btn){
  contractLang = lang;
  document.querySelectorAll('.lang-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  preview();
}

// ── 다국어 텍스트 ──
const CL = {
  ko:{
    titles:{work:'근 로 계 약 서',seasonal:'계절근로 계약서',dispatch:'파견근로 계약서',renew:'근로계약 갱신서'},
    subtitle:'본 계약서는 「근로기준법」 및 관련 법령에 따라 아래와 같이 체결합니다.',
    employer:'사업주 (甲)', worker:'근로자 (乙)',
    company:'사업장명', ceo:'대 표 자', addr:'주  소', regno:'사업자번호', tel:'연 락 처',
    name:'성  명', nation:'국  적', birth:'생년월일', regnum:'등록번호', visa:'비자종류', phone:'연 락 처', waddr:'주  소',
    s1:'제1조 (계약기간)', s2:'제2조 (근무 장소 및 담당 업무)', s3:'제3조 (근로시간 및 휴게)',
    s4:'제4조 (임금)', s5:'제5조 (안전·보건 및 복무)', s6:'제6조 (해고 및 퇴직)',
    s7:'제7조 (외국인 근로자 관련 사항)', s8:'제8조 (특약 사항)', s9:'제9조 (기타)',
    place:'근 무 장 소', job:'담 당 업 무', time:'근 로 시 간', rest:'휴 게 시 간', holiday:'주 휴 일',
    pay:'월 급 여', payday:'지 급 일', paymethod:'지급 방법', insurance:'4대보험', accomm:'숙식 제공',
    signEmployer:'사 업 주 (甲)', signWorker:'근 로 자 (乙)', signSuffix:'(서명 또는 인)',
    intro:'계약기간은', from:'부터', to:'까지로 한다.',
    insYes:'국민연금·건강보험·고용보험·산재보험 가입 (근로자 부담분 공제)',

// 구직자 자동완성
const workers = JSON.parse(localStorage.getItem('v5_workers')||'[]');
document.getElementById('wNameList').innerHTML = workers.map(w=>`<option value="${w.name}">`).join('');
document.getElementById('w-name').addEventListener('change', function(){
  const w = workers.find(x=>x.name===this.value); if(!w) return;
  if(w.nation) sv('w-nation',w.nation);
  if(w.phone)  document.getElementById('w-phone').value=w.phone;
  if(w.visa)   sv('w-visa',w.visa);
  if(w.gender) sv('w-gender',w.gender==='남'?'남':'여');
  preview();
});

// ── 템플릿 선택 ──
function setTpl(id, btn){
  currentTpl=id;
  document.querySelectorAll('.tpl-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  preview();
}

// ── 값 읽기 ──
function g(id){ return document.getElementById(id)?.value||''; }
function sv(id,val){ const el=document.getElementById(id); if(!el)return; for(let i=0;i<el.options?.length;i++){if(el.options[i].value===val||el.options[i].text===val){el.selectedIndex=i;return;}} }
function fmt(d){ if(!d)return''; const [y,m,da]=d.split('-'); return `${y}년 ${parseInt(m)}월 ${parseInt(da)}일`; }
function calcPeriod(s,e){
  if(!s||!e)return'';
  const ms=new Date(e)-new Date(s);
  const months=Math.round(ms/(1000*60*60*24*30));
  return `(${months}개월)`;
}

    <!-- 서명란 -->
    <div class="sign-area">
      <div class="sign-box">
        <h4>${L.signEmployer}${bi?`<br><small style="font-size:10pt;font-weight:400">${L2.signEmployer}</small>`:''}</h4>
        <div class="sign-line"></div>
        <div class="sign-name">
          ${L.company}: ${company}<br>
          ${L.ceo}: ${ceo} &nbsp; ${L.signSuffix}
          ${bi?`<br><span style="color:#2563EB;font-size:9pt">${L2.ceo}: ${ceo} &nbsp; ${L2.signSuffix}</span>`:''}
        </div>
      </div>
      <div class="sign-box">
        <h4>${L.signWorker}${bi?`<br><small style="font-size:10pt;font-weight:400">${L2.signWorker}</small>`:''}</h4>
        <div class="sign-line"></div>
        <div class="sign-name">
          ${L.name}: ${wName} &nbsp; ${L.signSuffix}
          ${bi?`<br><span style="color:#2563EB;font-size:9pt">${L2.name}: ${wName} &nbsp; ${L2.signSuffix}</span>`:''}
          ${wNation?`<br>${L.nation}: ${wNation}`:''}
        </div>
      </div>
    </div>

    <!-- 소개소 확인란 -->
    ${aName?`<div style="margin-top:20px;border:1px solid #ccc;padding:12px 16px;font-size:10pt">
      <strong>■ ${L.agencyConfirm}${bi?` / ${L2.agencyConfirm}`:''}</strong><br>
      ${L.company}: ${aName} &nbsp;|&nbsp; 담당: ${aManager||''} &nbsp;|&nbsp; ${L.tel}: ${aTel||''}<br>
      <span style="font-size:9pt;color:#666">${L.agencyText}${bi?` / ${L2.agencyText}`:''} &nbsp;&nbsp; ${L.managerSign}: ___________________</span>
    </div>`:''}

  </div>`;
}

// ── 미리보기 ──
function preview(){
  document.getElementById('previewWrap').innerHTML = buildContract();
}

// ── 인쇄 ──
function printContract(){
  window.print();
}

// ── 저장·불러오기 ──
function saveTemplate(){
  const ids=['e-company','e-ceo','e-addr','e-regno','e-tel','w-name','w-nation','w-birth','w-gender','w-addr','w-phone','w-visa','w-regnum','c-start','c-end','c-place','c-job','c-time','c-rest','c-pay','c-payday','c-paymethod','c-holiday','c-accomm','c-insurance','c-special','a-name','a-manager','a-tel'];
  const data={tpl:currentTpl};
  ids.forEach(id=>{data[id]=document.getElementById(id)?.value||'';});
  localStorage.setItem('contract_template',JSON.stringify(data));
  showToast('💾 저장됐습니다');
}
function loadTemplate(){
  const data=JSON.parse(localStorage.getItem('contract_template')||'null');
  if(!data){showToast('저장된 내용이 없습니다');return;}
  Object.entries(data).forEach(([k,v])=>{
    if(k==='tpl'){currentTpl=v;document.querySelectorAll('.tpl-btn').forEach((b,i)=>{const tpls=['work','seasonal','dispatch','renew'];b.classList.toggle('active',tpls[i]===v);});}
    else{const el=document.getElementById(k);if(el)el.value=v;}
  });
  preview();
  showToast('📂 불러오기 완료');
}

// ── UTILS ──
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// 초기 미리보기
preview();
// 기본값 세팅
document.getElementById('c-start').value=new Date().toISOString().split('T')[0];
const end=new Date(); end.setFullYear(end.getFullYear()+1);
document.getElementById('c-end').value=end.toISOString().split('T')[0];
preview();
</script>
