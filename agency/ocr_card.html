<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명함 스캔 → 자동 입력</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F4F8;--white:#fff;--navy:#1A3A5C;--blue:#2563EB;--blue-lt:#EFF6FF;
  --green:#16A34A;--green-lt:#F0FDF4;--orange:#EA580C;--gray:#64748B;
  --border:#CBD5E1;--text:#1E293B;--shadow:0 4px 20px rgba(0,0,0,.1);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}

.header{background:var(--navy);padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header h1{color:#fff;font-size:18px;font-weight:900}
.header span{color:#60A5FA;font-size:13px}
.back-btn{background:rgba(255,255,255,.15);border:none;border-radius:8px;color:#fff;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit;transition:.2s}
.back-btn:hover{background:rgba(255,255,255,.25)}

.main{padding:16px;max-width:600px;margin:0 auto}

/* ── 업로드 존 ── */
.upload-zone{
  background:var(--white);border-radius:16px;box-shadow:var(--shadow);
  border:3px dashed var(--border);padding:40px 24px;text-align:center;
  cursor:pointer;transition:.3s;margin-bottom:16px;position:relative;
}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:var(--blue-lt)}
.upload-zone.has-img{border-style:solid;border-color:var(--green);padding:16px}
.upload-icon{font-size:48px;margin-bottom:12px;display:block}
.upload-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:6px}
.upload-sub{font-size:13px;color:var(--gray);line-height:1.6}
.upload-input{display:none}
.camera-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--blue);color:#fff;border:none;border-radius:10px;
  padding:12px 24px;font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;margin-top:16px;transition:.2s;
}
.camera-btn:hover{background:#1D4ED8;transform:translateY(-1px)}

/* ── 미리보기 ── */
.preview-wrap{position:relative;margin-bottom:12px}
.preview-img{width:100%;border-radius:10px;max-height:260px;object-fit:contain;background:#f8f8f8}
.preview-change{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:7px;
  padding:6px 10px;font-size:12px;cursor:pointer;font-family:inherit;
}

/* ── AI 분석 버튼 ── */
.analyze-btn{
  width:100%;padding:18px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;
  font-size:17px;font-weight:900;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:.2s;margin-bottom:16px;box-shadow:0 4px 14px rgba(37,99,235,.35);
}
.analyze-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(37,99,235,.4)}
.analyze-btn:disabled{background:#CBD5E1;box-shadow:none;transform:none;cursor:not-allowed}

/* ── 로딩 ── */
.loading-box{
  background:var(--white);border-radius:14px;box-shadow:var(--shadow);
  padding:32px;text-align:center;margin-bottom:16px;display:none;
}
.spinner{
  width:48px;height:48px;border:4px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;
  animation:spin 0.8s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:6px}
.loading-sub{font-size:13px;color:var(--gray)}

/* ── 결과 카드 ── */
.result-card{
  background:var(--white);border-radius:14px;box-shadow:var(--shadow);
  overflow:hidden;margin-bottom:16px;display:none;
}
.result-hd{
  padding:14px 18px;background:var(--green);color:#fff;
  font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;
}
.result-body{padding:18px}
.result-type{
  display:flex;gap:8px;margin-bottom:16px;
}
.type-btn{
  flex:1;padding:10px;border-radius:8px;border:2px solid var(--border);
  background:var(--white);font-size:13px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:.2s;text-align:center;
}
.type-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.type-btn:not(.active):hover{border-color:var(--blue);background:var(--blue-lt)}

/* ── 폼 필드 ── */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg label{font-size:12px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:4px}
.ai-badge{background:var(--blue-lt);color:var(--blue);font-size:10px;font-weight:700;padding:1px 6px;border-radius:100px}
.fg input,.fg select{
  padding:12px 14px;border:2px solid var(--border);border-radius:8px;
  font-size:15px;font-family:inherit;transition:.2s;background:var(--white);
}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blue)}
.fg input.ai-filled{border-color:var(--green);background:var(--green-lt)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:1/-1}

/* ── 저장 버튼 ── */
.save-section{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.btn{padding:14px;border-radius:10px;border:none;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-job{background:var(--blue);color:#fff}.btn-job:hover{background:#1D4ED8}
.btn-worker{background:var(--green);color:#fff}.btn-worker:hover{background:#15803D}
.btn-reset{background:var(--bg);color:var(--gray);border:2px solid var(--border);grid-column:1/-1}
.btn-reset:hover{background:var(--border)}

/* ── 저장 완료 ── */
.saved-toast{
  background:var(--green);color:#fff;border-radius:12px;
  padding:16px 20px;text-align:center;font-size:15px;font-weight:700;
  display:none;margin-bottom:16px;animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── 히스토리 ── */
.history-section{background:var(--white);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.history-hd{padding:13px 16px;background:var(--navy);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.history-list{max-height:320px;overflow-y:auto}
.history-item{padding:12px 16px;border-bottom:1px solid var(--bg);display:flex;align-items:center;gap:10px;font-size:13px}
.history-item:last-child{border-bottom:none}
.hi-type{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.hi-type.job{background:var(--blue-lt)}
.hi-type.worker{background:var(--green-lt)}
.hi-info{flex:1}
.hi-name{font-weight:700;color:var(--navy)}
.hi-meta{color:var(--gray);font-size:11px}
.hi-time{font-size:10px;color:var(--border)}
.empty-hist{padding:28px;text-align:center;color:var(--gray);font-size:13px}

/* ── API KEY 설정 ── */
.api-notice{
  background:#FFF7ED;border:1px solid #FED7AA;border-radius:10px;
  padding:12px 14px;font-size:12px;color:#92400E;margin-bottom:14px;
  line-height:1.6;
}
.api-key-row{display:flex;gap:8px;margin-bottom:12px}
.api-key-input{flex:1;padding:10px 13px;border:2px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit}
.api-key-input:focus{outline:none;border-color:var(--blue)}
.api-save-btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}

@media(max-width:500px){.form-grid{grid-template-columns:1fr}.save-section{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">← 뒤로</button>
  <h1>📇 명함 스캔</h1>
  <span>AI 자동 인식</span>
</div>

<div class="main">

  <!-- API KEY 설정 -->
  <div class="api-notice" id="apiNotice">
    ⚙️ AI 인식을 사용하려면 Anthropic API 키가 필요합니다.<br>
    <a href="https://console.anthropic.com" target="_blank" style="color:var(--orange)">console.anthropic.com</a>에서 발급 후 입력해주세요.
  </div>
  <div class="api-key-row">
    <input class="api-key-input" type="password" id="apiKeyInput" placeholder="sk-ant-api03-...">
    <button class="api-save-btn" onclick="saveApiKey()">💾 저장</button>
  </div>

  <!-- 업로드 존 -->
  <div class="upload-zone" id="uploadZone"
    onclick="document.getElementById('fileInput').click()"
    ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
    <div id="uploadDefault">
      <span class="upload-icon">📇</span>
      <div class="upload-title">명함 사진을 올려주세요</div>
      <div class="upload-sub">
        사진을 끌어다 놓거나<br>버튼을 눌러 선택하세요
      </div>
      <button class="camera-btn" onclick="event.stopPropagation();document.getElementById('fileInput').click()">
        📷 사진 선택 / 카메라 촬영
      </button>
    </div>
    <div id="uploadPreview" style="display:none">
      <div class="preview-wrap">
        <img id="previewImg" class="preview-img" src="" alt="명함 미리보기">
        <button class="preview-change" onclick="event.stopPropagation();resetUpload()">✕ 다시 선택</button>
      </div>
    </div>
  </div>
  <input type="file" id="fileInput" class="upload-input" accept="image/*" capture="environment" onchange="onFileSelect(event)">

  <!-- 분석 버튼 -->
  <button class="analyze-btn" id="analyzeBtn" disabled onclick="analyze()">
    🤖 AI로 명함 분석하기
  </button>

  <!-- 로딩 -->
  <div class="loading-box" id="loadingBox">
    <div class="spinner"></div>
    <div class="loading-text">AI가 명함을 읽고 있습니다...</div>
    <div class="loading-sub">이름, 연락처, 회사명을 자동으로 추출합니다</div>
  </div>

  <!-- 결과 카드 -->
  <div class="result-card" id="resultCard">
    <div class="result-hd">✅ 인식 완료 — 정보를 확인하고 저장하세요</div>
    <div class="result-body">

      <!-- 저장 유형 선택 -->
      <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px">어떤 DB에 저장할까요?</div>
      <div class="result-type">
        <button class="type-btn active" id="typeJob" onclick="setType('job')">🏭 구인업체</button>
        <button class="type-btn" id="typeWorker" onclick="setType('worker')">👤 구직자</button>
      </div>

      <!-- 구인업체 폼 -->
      <div id="jobForm">
        <div class="form-grid">
          <div class="fg full">
            <label>업체명 <span class="ai-badge">AI</span></label>
            <input type="text" id="j-company" placeholder="업체명">
          </div>
          <div class="fg full">
            <label>담당자명 <span class="ai-badge">AI</span></label>
            <input type="text" id="j-contact-name" placeholder="담당자 이름">
          </div>
          <div class="fg full">
            <label>연락처 <span class="ai-badge">AI</span></label>
            <input type="text" id="j-phone" placeholder="전화번호">
          </div>
          <div class="fg full">
            <label>이메일 <span class="ai-badge">AI</span></label>
            <input type="text" id="j-email" placeholder="이메일">
          </div>
          <div class="fg">
            <label>업종</label>
            <select id="j-sector">
              <option value="">선택</option>
              <option>제조업 (공장)</option><option>농업 (농장)</option>
              <option>건설업</option><option>어업</option>
              <option>서비스업</option><option>식품가공</option>
            </select>
          </div>
          <div class="fg">
            <label>근무 지역 <span class="ai-badge">AI</span></label>
            <input type="text" id="j-region" placeholder="지역">
          </div>
          <div class="fg full">
            <label>주소 <span class="ai-badge">AI</span></label>
            <input type="text" id="j-address" placeholder="주소">
          </div>
          <div class="fg">
            <label>필요 인원</label>
            <input type="number" id="j-count" value="1" min="1">
          </div>
          <div class="fg">
            <label>선호 국적</label>
            <select id="j-nation">
              <option value="">무관</option>
              <option>베트남</option><option>네팔</option>
              <option>캄보디아</option><option>인도네시아</option><option>미얀마</option>
            </select>
          </div>
          <div class="fg">
            <label>급여</label>
            <input type="text" id="j-pay" placeholder="예: 월 260만원">
          </div>
          <div class="fg">
            <label>메모</label>
            <input type="text" id="j-memo" placeholder="특이사항">
          </div>
        </div>
      </div>

      <!-- 구직자 폼 -->
      <div id="workerForm" style="display:none">
        <div class="form-grid">
          <div class="fg full">
            <label>이름 <span class="ai-badge">AI</span></label>
            <input type="text" id="w-name" placeholder="이름">
          </div>
          <div class="fg full">
            <label>연락처 <span class="ai-badge">AI</span></label>
            <input type="text" id="w-phone" placeholder="전화번호">
          </div>
          <div class="fg">
            <label>국적</label>
            <select id="w-nation">
              <option value="">선택</option>
              <option>베트남</option><option>네팔</option>
              <option>캄보디아</option><option>인도네시아</option><option>미얀마</option>
            </select>
          </div>
          <div class="fg">
            <label>나이</label>
            <input type="number" id="w-age" placeholder="나이" min="18" max="65">
          </div>
          <div class="fg">
            <label>성별</label>
            <select id="w-gender"><option value="남">남</option><option value="여">여</option></select>
          </div>
          <div class="fg">
            <label>가능 업종</label>
            <select id="w-job">
              <option value="">선택</option>
              <option>제조업 (공장)</option><option>농업 (농장)</option>
              <option>건설업</option><option>어업</option>
              <option>서비스업</option><option>식품가공</option>
            </select>
          </div>
          <div class="fg">
            <label>비자</label>
            <select id="w-visa">
              <option>E-9</option><option>E-7</option>
              <option>H-2</option><option>F-4</option><option>기타</option>
            </select>
          </div>
          <div class="fg">
            <label>한국어</label>
            <select id="w-korean">
              <option>없음</option><option>초급</option>
              <option>중급</option><option>고급</option>
            </select>
          </div>
          <div class="fg full">
            <label>메모 <span class="ai-badge">AI</span></label>
            <input type="text" id="w-memo" placeholder="경력, 특기사항">
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- 저장 버튼 -->
  <div class="save-section" id="saveBtns" style="display:none">
    <button class="btn btn-job" id="saveJobBtn" onclick="saveToDb()">💾 구인업체 DB에 저장</button>
    <button class="btn btn-reset" onclick="resetAll()">🔄 처음부터</button>
  </div>

  <!-- 저장 완료 메시지 -->
  <div class="saved-toast" id="savedToast"></div>

  <!-- 스캔 히스토리 -->
  <div class="history-section">
    <div class="history-hd">
      <span>📋 스캔 이력</span>
      <button onclick="clearHistory()" style="background:rgba(255,255,255,.15);border:none;color:#fff;padding:3px 8px;border-radius:5px;font-size:11px;cursor:pointer">지우기</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<script>
// ── 상태 ──
let imageBase64 = null;
let imageType   = null;
let currentType = 'job'; // 'job' | 'worker'
let scanHistory = JSON.parse(localStorage.getItem('ocr_history') || '[]');

// ── API KEY ──
function saveApiKey(){
  const key = document.getElementById('apiKeyInput').value.trim();
  if(!key.startsWith('sk-')){alert('올바른 API 키를 입력해주세요 (sk-ant-...)');return;}
  localStorage.setItem('anthropic_key', key);
  document.getElementById('apiNotice').style.display='none';
  document.getElementById('apiKeyInput').value = '••••••••••••••••••••';
  showToast('✅ API 키 저장됨');
}

// 저장된 키 확인
window.addEventListener('load', ()=>{
  const saved = localStorage.getItem('anthropic_key');
  if(saved){
    document.getElementById('apiNotice').style.display='none';
    document.getElementById('apiKeyInput').value='••••••••••••••••••••';
    document.getElementById('apiKeyInput').placeholder='API 키 설정됨 (변경하려면 새로 입력)';
  }
  renderHistory();
});

// ── 파일 선택 ──
function onFileSelect(e){
  const file = e.target.files[0];
  if(file) loadImage(file);
}
function onDragOver(e){e.preventDefault();document.getElementById('uploadZone').classList.add('drag');}
function onDragLeave(){document.getElementById('uploadZone').classList.remove('drag');}
function onDrop(e){e.preventDefault();document.getElementById('uploadZone').classList.remove('drag');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))loadImage(f);}

function loadImage(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    imageBase64 = e.target.result.split(',')[1];
    imageType   = file.type;
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('uploadDefault').style.display='none';
    document.getElementById('uploadPreview').style.display='block';
    document.getElementById('uploadZone').classList.add('has-img');
    document.getElementById('analyzeBtn').disabled = false;
    // 결과 초기화
    document.getElementById('resultCard').style.display='none';
    document.getElementById('saveBtns').style.display='none';
    document.getElementById('savedToast').style.display='none';
  };
  reader.readAsDataURL(file);
}

function resetUpload(){
  imageBase64=null; imageType=null;
  document.getElementById('fileInput').value='';
  document.getElementById('uploadDefault').style.display='block';
  document.getElementById('uploadPreview').style.display='none';
  document.getElementById('uploadZone').classList.remove('has-img');
  document.getElementById('analyzeBtn').disabled=true;
  document.getElementById('resultCard').style.display='none';
  document.getElementById('saveBtns').style.display='none';
}

function resetAll(){
  resetUpload();
  document.getElementById('savedToast').style.display='none';
}

// ── AI 분석 ──
async function analyze(){
  const apiKey = localStorage.getItem('anthropic_key');
  if(!apiKey){alert('API 키를 먼저 입력해주세요');return;}
  if(!imageBase64){alert('이미지를 먼저 선택해주세요');return;}

  document.getElementById('analyzeBtn').disabled=true;
  document.getElementById('loadingBox').style.display='block';
  document.getElementById('resultCard').style.display='none';
  document.getElementById('saveBtns').style.display='none';

  try{
    const response = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages:[{
          role:'user',
          content:[
            {
              type:'image',
              source:{type:'base64', media_type: imageType, data: imageBase64}
            },
            {
              type:'text',
              text:`이 명함 이미지를 분석해서 다음 정보를 JSON 형식으로만 반환하세요. 찾을 수 없는 항목은 빈 문자열로 두세요.

{
  "company": "회사명",
  "contact_name": "담당자 이름",
  "phone": "전화번호 (숫자와 하이픈만)",
  "mobile": "휴대폰 번호",
  "email": "이메일",
  "address": "주소",
  "region": "지역 (시/도 수준, 예: 경기 시흥)",
  "title": "직책",
  "memo": "기타 특이사항",
  "is_worker": false
}

is_worker는 이 명함이 구직자(외국인 근로자) 개인의 명함이면 true, 회사/업체 명함이면 false로 설정하세요.
JSON만 반환하고 다른 텍스트는 절대 포함하지 마세요.`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    if(!response.ok) throw new Error(data.error?.message || '분석 실패');

    const text = data.content[0].text.trim();
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    fillForm(parsed);
    document.getElementById('loadingBox').style.display='none';
    document.getElementById('resultCard').style.display='block';
    document.getElementById('saveBtns').style.display='grid';
    document.getElementById('analyzeBtn').disabled=false;

    // 자동 타입 감지
    if(parsed.is_worker) setType('worker');
    else setType('job');

  } catch(err){
    document.getElementById('loadingBox').style.display='none';
    document.getElementById('analyzeBtn').disabled=false;
    alert('분석 실패: ' + err.message + '\nAPI 키를 확인해주세요');
  }
}

// ── 폼 채우기 ──
function fillForm(data){
  // 구인업체 필드
  setField('j-company',    data.company);
  setField('j-contact-name', data.contact_name || data.title);
  setField('j-phone',      data.mobile || data.phone);
  setField('j-email',      data.email);
  setField('j-address',    data.address);
  setField('j-region',     data.region);
  setField('j-memo',       data.title ? `직책: ${data.title}` : data.memo);

  // 구직자 필드
  setField('w-name',  data.contact_name);
  setField('w-phone', data.mobile || data.phone);
  setField('w-memo',  data.memo);
}

function setField(id, val){
  const el = document.getElementById(id);
  if(!el || !val) return;
  el.value = val;
  if(el.tagName==='INPUT') el.classList.add('ai-filled');
}

// ── 타입 전환 ──
function setType(type){
  currentType = type;
  document.getElementById('typeJob').classList.toggle('active', type==='job');
  document.getElementById('typeWorker').classList.toggle('active', type==='worker');
  document.getElementById('jobForm').style.display   = type==='job'    ? 'block':'none';
  document.getElementById('workerForm').style.display= type==='worker' ? 'block':'none';

  const saveBtn = document.getElementById('saveJobBtn');
  if(type==='job'){
    saveBtn.textContent='💾 구인업체 DB에 저장';
    saveBtn.className='btn btn-job';
  } else {
    saveBtn.textContent='💾 구직자 DB에 저장';
    saveBtn.className='btn btn-worker';
  }
}

// ── DB 저장 ──
function saveToDb(){
  const owner = getOwner();

  if(currentType==='job'){
    const company = document.getElementById('j-company').value.trim();
    if(!company){alert('업체명을 입력해주세요');return;}

    const fm={'제조업 (공장)':'jf-mfg','농업 (농장)':'jf-farm','건설업':'jf-cons','어업':'jf-fish','서비스업':'jf-svc','식품가공':'jf-food'};
    const sec = document.getElementById('j-sector').value;

    const job = {
      id: Date.now(), owner,
      company,
      address:  document.getElementById('j-address').value,
      contact:  `${document.getElementById('j-contact-name').value} / ${document.getElementById('j-phone').value}`,
      sector:   sec || '미분류',
      count:    parseInt(document.getElementById('j-count').value)||1,
      nation:   document.getElementById('j-nation').value,
      pay:      document.getElementById('j-pay').value,
      region:   document.getElementById('j-region').value,
      memo:     document.getElementById('j-memo').value,
      folderId: fm[sec]||'jf-all',
      source:   '명함스캔',
      date:     new Date().toLocaleDateString('ko-KR')
    };
    const arr = JSON.parse(localStorage.getItem('v5_jobs')||'[]');
    arr.push(job);
    localStorage.setItem('v5_jobs', JSON.stringify(arr));

    addHistory({type:'job', name:company, meta:`${sec||'업종미상'} · ${document.getElementById('j-region').value||'지역미상'}`});
    showSaved(`🏭 "${company}" 구인업체 DB에 저장됐습니다!`);

  } else {
    const name = document.getElementById('w-name').value.trim();
    if(!name){alert('이름을 입력해주세요');return;}

    const nat = document.getElementById('w-nation').value;
    const fm2={'베트남':'wf-vn','네팔':'wf-np','캄보디아':'wf-kh','인도네시아':'wf-id','미얀마':'wf-mm'};

    const worker = {
      id: Date.now(), owner,
      name,
      nation:  nat,
      age:     parseInt(document.getElementById('w-age').value)||0,
      gender:  document.getElementById('w-gender').value,
      phone:   document.getElementById('w-phone').value,
      job:     document.getElementById('w-job').value||'미분류',
      visa:    document.getElementById('w-visa').value,
      visaexp: '',
      korean:  document.getElementById('w-korean').value,
      status:  '구직중',
      memo:    document.getElementById('w-memo').value,
      folderId:fm2[nat]||'wf-all',
      source:  '명함스캔',
      date:    new Date().toLocaleDateString('ko-KR')
    };
    const arr = JSON.parse(localStorage.getItem('v5_workers')||'[]');
    arr.push(worker);
    localStorage.setItem('v5_workers', JSON.stringify(arr));

    addHistory({type:'worker', name, meta:`${nat||'국적미상'} · ${document.getElementById('w-job').value||'업종미상'}`});
    showSaved(`👤 "${name}" 구직자 DB에 저장됐습니다!`);
  }
}

function getOwner(){
  // URL 파라미터 또는 v5 로그인 정보
  const p = new URLSearchParams(window.location.search).get('owner');
  if(p) return p;
  // localStorage에 마지막 로그인 사용자 없으면 '직접입력'
  return '직접입력';
}

function showSaved(msg){
  const el = document.getElementById('savedToast');
  el.textContent = msg;
  el.style.display='block';
  document.getElementById('saveBtns').style.display='none';
  renderHistory();
}

// ── 히스토리 ──
function addHistory(item){
  item.time = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  scanHistory.unshift(item);
  if(scanHistory.length>30) scanHistory.pop();
  localStorage.setItem('ocr_history', JSON.stringify(scanHistory));
}

function renderHistory(){
  const el = document.getElementById('historyList');
  if(!scanHistory.length){
    el.innerHTML='<div class="empty-hist">스캔 이력이 없습니다</div>';
    return;
  }
  el.innerHTML = scanHistory.map(h=>`
    <div class="history-item">
      <div class="hi-type ${h.type}">${h.type==='job'?'🏭':'👤'}</div>
      <div class="hi-info">
        <div class="hi-name">${h.name}</div>
        <div class="hi-meta">${h.meta}</div>
      </div>
      <div class="hi-time">${h.time}</div>
    </div>
  `).join('');
}

function clearHistory(){
  if(!confirm('이력을 모두 지울까요?')) return;
  scanHistory=[];
  localStorage.removeItem('ocr_history');
  renderHistory();
}

function showToast(msg){
  // 간단 토스트
  const t=document.createElement('div');
  t.textContent=msg;
  Object.assign(t.style,{position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%)',background:'#1A3A5C',color:'#fff',padding:'12px 20px',borderRadius:'10px',fontSize:'14px',fontWeight:'600',zIndex:'999',whiteSpace:'nowrap'});
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}
</script>
